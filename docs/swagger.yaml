basePath: /
definitions:
  github_com_yourusername_lms_internal_model.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  github_com_yourusername_lms_internal_model.LoginResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/github_com_yourusername_lms_internal_model.User'
    type: object
  github_com_yourusername_lms_internal_model.RegisterRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  github_com_yourusername_lms_internal_model.UpdateUserRequest:
    properties:
      avatar:
        maxLength: 500
        type: string
      name:
        maxLength: 255
        minLength: 1
        type: string
      role:
        enum:
        - admin
        - user
        - tutor
        type: string
      status:
        enum:
        - active
        - inactive
        - suspended
        type: string
    type: object
  github_com_yourusername_lms_internal_model.User:
    properties:
      avatar:
        type: string
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
      role:
        type: string
      status:
        type: string
      updated_at:
        type: string
    type: object
  github_com_yourusername_lms_pkg_response.ErrorResponse:
    properties:
      error: {}
      success:
        type: boolean
    type: object
  github_com_yourusername_lms_pkg_response.PaginatedResponse:
    properties:
      data: {}
      meta:
        $ref: '#/definitions/github_com_yourusername_lms_pkg_response.PaginationMeta'
      success:
        type: boolean
    type: object
  github_com_yourusername_lms_pkg_response.PaginationMeta:
    properties:
      page:
        type: integer
      page_size:
        type: integer
      total_items:
        type: integer
      total_pages:
        type: integer
    type: object
  github_com_yourusername_lms_pkg_response.SuccessResponse:
    properties:
      data: {}
      success:
        type: boolean
    type: object
  internal_handler.Check:
    properties:
      error:
        type: string
      latency:
        type: string
      status:
        type: string
    type: object
  internal_handler.DatabaseInfo:
    properties:
      database:
        type: string
      host:
        type: string
      idle_conns:
        type: integer
      latency:
        type: string
      max_idle:
        type: integer
      max_open:
        type: integer
      open_conns:
        type: integer
      status:
        type: string
    type: object
  internal_handler.DetailedHealthStatus:
    properties:
      checks:
        additionalProperties:
          $ref: '#/definitions/internal_handler.Check'
        type: object
      database:
        $ref: '#/definitions/internal_handler.DatabaseInfo'
      status:
        type: string
      system:
        $ref: '#/definitions/internal_handler.SystemInfo'
      timestamp:
        type: string
      uptime:
        type: string
      version:
        type: string
    type: object
  internal_handler.HealthStatus:
    properties:
      checks:
        additionalProperties:
          $ref: '#/definitions/internal_handler.Check'
        type: object
      status:
        type: string
      system:
        $ref: '#/definitions/internal_handler.SystemInfo'
      timestamp:
        type: string
      uptime:
        type: string
      version:
        type: string
    type: object
  internal_handler.SystemInfo:
    properties:
      arch:
        type: string
      go_version:
        type: string
      num_cpu:
        type: integer
      num_goroutine:
        type: integer
      os:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: admin@lms.com
    name: API Support
  description: Learning Management System Backend API
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: LMS Backend API
  version: 1.0.0
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user and return JWT token
      parameters:
      - description: Login request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_yourusername_lms_internal_model.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_yourusername_lms_pkg_response.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_yourusername_lms_internal_model.LoginResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_yourusername_lms_pkg_response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_yourusername_lms_pkg_response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_yourusername_lms_pkg_response.ErrorResponse'
      summary: Login user
      tags:
      - auth
  /auth/me:
    get:
      description: Get the authenticated user's profile
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_yourusername_lms_pkg_response.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_yourusername_lms_internal_model.User'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_yourusername_lms_pkg_response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_yourusername_lms_pkg_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Create a new user account and return JWT token
      parameters:
      - description: Register request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_yourusername_lms_internal_model.RegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_yourusername_lms_pkg_response.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_yourusername_lms_internal_model.LoginResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_yourusername_lms_pkg_response.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/github_com_yourusername_lms_pkg_response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_yourusername_lms_pkg_response.ErrorResponse'
      summary: Register a new user
      tags:
      - auth
  /health:
    get:
      description: Returns OK if service is running
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Basic health check
      tags:
      - health
  /health/detailed:
    get:
      description: Returns detailed health with connection pool stats
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.DetailedHealthStatus'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/internal_handler.DetailedHealthStatus'
      summary: Detailed health check
      tags:
      - health
  /health/live:
    get:
      description: Kubernetes liveness probe endpoint
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Liveness probe
      tags:
      - health
  /health/ready:
    get:
      description: Kubernetes readiness probe — checks database connectivity
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Service Unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Readiness probe
      tags:
      - health
  /health/status:
    get:
      description: Returns health status with database check and system info
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.HealthStatus'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/internal_handler.HealthStatus'
      summary: Comprehensive health status
      tags:
      - health
  /users:
    get:
      description: Get paginated list of users with optional filters
      parameters:
      - default: 1
        description: Page number
        in: query
        minimum: 1
        name: page
        type: integer
      - default: 20
        description: Items per page
        in: query
        maximum: 100
        minimum: 1
        name: page_size
        type: integer
      - description: Filter by role
        enum:
        - admin
        - user
        - tutor
        in: query
        name: role
        type: string
      - description: Filter by status
        enum:
        - active
        - inactive
        - suspended
        in: query
        name: status
        type: string
      - description: Search name/email
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_yourusername_lms_pkg_response.PaginatedResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/github_com_yourusername_lms_internal_model.User'
                  type: array
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_yourusername_lms_pkg_response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_yourusername_lms_pkg_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List users
      tags:
      - users
  /users/{id}:
    delete:
      description: Delete a user by ID
      parameters:
      - description: User ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_yourusername_lms_pkg_response.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_yourusername_lms_pkg_response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_yourusername_lms_pkg_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete user
      tags:
      - users
    get:
      description: Get a single user by their UUID
      parameters:
      - description: User ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_yourusername_lms_pkg_response.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_yourusername_lms_internal_model.User'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_yourusername_lms_pkg_response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_yourusername_lms_pkg_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get user by ID
      tags:
      - users
    put:
      consumes:
      - application/json
      description: Update user profile (name, role, avatar, status)
      parameters:
      - description: User ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Update fields
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_yourusername_lms_internal_model.UpdateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_yourusername_lms_pkg_response.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_yourusername_lms_internal_model.User'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_yourusername_lms_pkg_response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_yourusername_lms_pkg_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update user
      tags:
      - users
schemes:
- http
- https
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
